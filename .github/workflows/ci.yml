name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

# Drop in-progress runs when a newer commit hits the same branch/PR (saves minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Format, vet & lint
    runs-on: ubuntu-latest
    # Tag builds only publish images; tests already ran on the tagged commit.
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Go format check
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          install-mode: goinstall

  unit-tests:
    name: Go tests
    runs-on: ubuntu-latest
    # Tag builds only publish images; tests already ran on the tagged commit.
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Go tests
        run: make test

  build-image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [static-checks, unit-tests]
    # On tags, CI jobs above are skipped; `always()` lets this job run anyway (see GitHub docs on skipped `needs`).
    if: >-
      always() && !cancelled() && startsWith(github.ref, 'refs/tags/') &&
      (needs.static-checks.result == 'success' || needs.static-checks.result == 'skipped') &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        run: |
          TAG=${{ github.ref_name }}
          # Embed Git tag in relay binary (internal/relay.Version) and OCI label (see Dockerfile ARG VERSION).
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "VERSION=${TAG}" \
            --tag ghcr.io/lanby-dev/lanby-relay:$TAG \
            --tag ghcr.io/lanby-dev/lanby-relay:latest \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            .

      - name: Verify image reports release version
        run: |
          TAG=${{ github.ref_name }}
          docker pull "ghcr.io/lanby-dev/lanby-relay:${TAG}"
          got=$(docker inspect --format '{{index .Config.Labels "org.opencontainers.image.version"}}' "ghcr.io/lanby-dev/lanby-relay:${TAG}")
          if [ "$got" != "$TAG" ]; then
            echo "Expected org.opencontainers.image.version=${TAG}, got ${got:-<empty>}"
            exit 1
          fi
          echo "OK: image label version=${got}"
